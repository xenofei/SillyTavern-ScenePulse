name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: ScenePulse Version
      placeholder: "e.g., 6.6.0"
    validations:
      required: true
  - type: input
    id: st-version
    attributes:
      label: SillyTavern Version
      placeholder: "e.g., 1.17.0"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Injection Mode
      options:
        - Together
        - Separate
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: AI Model & Provider
      placeholder: "e.g., GLM-5.1 via OpenRouter"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "e.g., Chrome 124, Firefox 126"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console Logs / Screenshots
      description: Paste SP debug log or browser console output, or attach screenshots.
